<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コラム管理 | STRATOZ Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <!-- SimpleMDE Markdown editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplemde@1.11.2/dist/simplemde.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a3a6b; --accent: #c8972b; --danger: #e74c3c; --success: #2ecc71;
      --bg: #f0f2f7; --white: #fff; --border: #dde3ec;
      --text: #1e1e1e; --text-muted: #888;
      --shadow: 0 2px 12px rgba(26,58,107,0.10);
      --radius: 8px;
    }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    /* ---- Top bar ---- */
    .topbar {
      background: var(--primary); color: #fff; padding: 0 24px;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1rem; }
    .topbar-brand i { color: var(--accent); }
    .topbar-links { display: flex; align-items: center; gap: 16px; font-size: 0.82rem; }
    .topbar-links a { color: rgba(255,255,255,0.8); transition: 0.2s; }
    .topbar-links a:hover { color: #fff; }

    /* ---- Layout ---- */
    .admin-wrap { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 56px); }

    /* ---- Sidebar ---- */
    .admin-sidebar {
      background: var(--white); border-right: 1px solid var(--border);
      padding: 24px 0;
    }
    .sidebar-section { padding: 0 16px; margin-bottom: 24px; }
    .sidebar-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 8px 10px; display: block; }
    .sidebar-btn {
      display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px;
      border-radius: var(--radius); border: none; background: transparent; font-size: 0.88rem;
      color: var(--text); transition: 0.2s; font-family: inherit; text-align: left;
    }
    .sidebar-btn i { width: 18px; text-align: center; color: var(--text-muted); }
    .sidebar-btn:hover { background: var(--bg); }
    .sidebar-btn.active { background: #e8eef7; color: var(--primary); font-weight: 700; }
    .sidebar-btn.active i { color: var(--primary); }
    .sidebar-btn.btn-new { background: var(--primary); color: #fff; margin-bottom: 6px; }
    .sidebar-btn.btn-new i { color: rgba(255,255,255,0.7); }
    .sidebar-btn.btn-new:hover { background: #2550a0; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 8px; }
    .stat-card { background: var(--bg); border-radius: var(--radius); padding: 12px; text-align: center; }
    .stat-num { font-size: 1.4rem; font-weight: 900; color: var(--primary); line-height: 1; }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }

    /* ---- Main content ---- */
    .admin-main { padding: 28px 32px; overflow-y: auto; }

    /* ---- Section panels ---- */
    .panel { display: none; }
    .panel.active { display: block; }
    .panel-title { font-size: 1.15rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .panel-title i { color: var(--accent); }

    /* ---- Article table ---- */
    .art-table-wrap { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    .art-table { width: 100%; border-collapse: collapse; }
    .art-table th { background: var(--bg); padding: 12px 16px; text-align: left; font-size: 0.78rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
    .art-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: middle; }
    .art-table tr:last-child td { border-bottom: none; }
    .art-table tr:hover td { background: #fafbfc; }
    .art-title-cell { font-weight: 700; color: var(--primary); max-width: 300px; }
    .art-title-cell a { color: inherit; }
    .art-title-cell a:hover { text-decoration: underline; }
    .art-slug-cell { font-size: 0.78rem; color: var(--text-muted); font-family: monospace; }
    .status-badge { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 100px; }
    .status-published { background: #d4f7e4; color: #1a7a4a; }
    .status-draft { background: #f0f2f7; color: #888; }
    .cat-badge { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 2px; color: #fff; }
    .cat-law{background:#2a6ebb;} .cat-risk{background:#c0392b;} .cat-ipo{background:#1a7a4a;}
    .cat-outsourcing{background:#7d4ec8;} .cat-subsidy{background:#c8782b;} .cat-hr{background:#2b8fc8;} .cat-notice{background:#888;}
    .action-btns { display: flex; gap: 6px; }
    .btn-sm {
      padding: 5px 12px; border-radius: 4px; font-size: 0.78rem; font-weight: 700;
      border: none; transition: 0.2s;
    }
    .btn-edit { background: var(--primary); color: #fff; }
    .btn-edit:hover { background: #2550a0; }
    .btn-preview { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-preview:hover { background: #e8eef7; }
    .btn-delete { background: var(--danger); color: #fff; }
    .btn-delete:hover { background: #c0392b; }
    .btn-publish { background: var(--success); color: #fff; }
    .btn-publish:hover { background: #27ae60; }
    .featured-star { color: var(--accent); font-size: 1rem; }

    /* ---- Form panel ---- */
    .form-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
    .form-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .form-card-title { font-size: 0.82rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .form-card-title i { color: var(--accent); }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .form-label .req { color: var(--danger); margin-left: 4px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 4px; font-family: inherit; font-size: 0.88rem;
      color: var(--text); transition: 0.2s; outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,58,107,0.08); }
    .form-input[readonly] { background: var(--bg); color: var(--text-muted); cursor: default; }
    .form-textarea { resize: vertical; min-height: 90px; }
    .eyecatch-preview-wrap { margin-top: 12px; padding: 12px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
    .eyecatch-preview-img { max-width: 100%; max-height: 200px; display: block; border-radius: 4px; }
    .form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-check { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; }
    .form-check input { width: 16px; height: 16px; accent-color: var(--primary); }
    .form-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ---- HTML Body editor ---- */
    .body-editor-wrap { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .body-editor-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
    .editor-tab { padding: 8px 18px; font-size: 0.82rem; font-weight: 700; color: var(--text-muted); border: none; background: transparent; cursor: pointer; transition: 0.2s; }
    .editor-tab.active { color: var(--primary); background: var(--white); border-bottom: 2px solid var(--primary); margin-bottom: -1px; }
    #body-html { width: 100%; min-height: 320px; padding: 14px; font-family: monospace; font-size: 0.85rem; border: none; outline: none; resize: vertical; background: var(--white); line-height: 1.6; }
    #body-preview { padding: 20px; min-height: 200px; font-size: 0.9rem; line-height: 1.9; display: none; background: var(--white); }
    #body-preview h2 { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }
    #body-preview h3 { font-size: 0.98rem; font-weight: 700; color: var(--primary); margin: 18px 0 10px; padding-left: 10px; border-left: 3px solid var(--accent); }
    #body-preview p { margin-bottom: 14px; }
    #body-preview ul, #body-preview ol { padding-left: 24px; margin-bottom: 16px; }
    #body-preview ul { list-style: disc; } #body-preview ol { list-style: decimal; }
    #body-preview li { margin-bottom: 6px; }

    /* ---- Snippet toolbar ---- */
    .snippet-bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .snippet-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 700; background: var(--white); color: var(--text); cursor: pointer; transition: 0.2s; }
    .snippet-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ---- Submit buttons ---- */
    .form-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary { background: var(--primary); color: #fff; padding: 11px 24px; border-radius: var(--radius); font-weight: 700; font-size: 0.9rem; border: none; transition: 0.2s; }
    .btn-primary:hover { background: #2550a0; }
    .btn-secondary { background: var(--bg); color: var(--text); padding: 11px 24px; border-radius: var(--radius); font-weight: 700; font-size: 0.9rem; border: 1px solid var(--border); transition: 0.2s; }
    .btn-secondary:hover { background: var(--border); }
    .btn-save-draft { background: #f0a500; color: #fff; padding: 11px 24px; border-radius: var(--radius); font-weight: 700; font-size: 0.9rem; border: none; transition: 0.2s; }
    .btn-save-draft:hover { background: #d4900a; }

    /* ---- Toast ---- */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: var(--primary); color: #fff; padding: 14px 24px;
      border-radius: var(--radius); font-size: 0.88rem; font-weight: 700;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18); transform: translateY(80px);
      opacity: 0; transition: 0.35s ease; display: flex; align-items: center; gap: 10px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }

    /* ---- Modal confirm ---- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500;
      display: flex; align-items: center; justify-content: center; display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--white); border-radius: var(--radius); padding: 32px; max-width: 400px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
    .modal-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
    .modal-msg { font-size: 0.88rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* ---- Loading overlay ---- */
    .spinner-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.7);
      z-index: 400; display: flex; align-items: center; justify-content: center; display: none;
    }
    .spinner-overlay.open { display: flex; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1024px) {
      .admin-wrap { grid-template-columns: 1fr; }
      .admin-sidebar { display: none; }
      .form-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .admin-main { padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ---- Top bar ---- -->
<div class="topbar">
  <div class="topbar-brand">
    <i class="fas fa-pen-nib"></i>
    STRATOZ コラム管理
  </div>
  <div class="topbar-links">
    <a href="../column/index.html" target="_blank"><i class="fas fa-external-link-alt"></i> 一覧を見る</a>
    <span style="color:rgba(255,255,255,0.4);">|</span>
    <a href="../index.html"><i class="fas fa-home"></i> サイトトップ</a>
  </div>
</div>

<!-- ---- Admin Layout ---- -->
<div class="admin-wrap">
  <!-- Sidebar -->
  <nav class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-section">
      <button class="sidebar-btn btn-new" id="btn-new-article">
        <i class="fas fa-plus-circle"></i> 新規記事を作成
      </button>
      <button class="sidebar-btn active" data-panel="panel-list" id="nav-list">
        <i class="fas fa-list"></i> 記事一覧
      </button>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label">統計</span>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-num" id="stat-total">–</div><div class="stat-label">合計</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-published">–</div><div class="stat-label">公開中</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-draft">–</div><div class="stat-label">下書き</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-featured">–</div><div class="stat-label">注目</div></div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="admin-main">

    <!-- ===== Panel: List ===== -->
    <div class="panel active" id="panel-list">
      <div class="panel-title"><i class="fas fa-list-ul"></i> 記事一覧</div>
      <div class="art-table-wrap">
        <table class="art-table">
          <thead>
            <tr>
              <th>タイトル</th>
              <th>Slug</th>
              <th>カテゴリ</th>
              <th>ステータス</th>
              <th>公開日</th>
              <th>注目</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="article-tbody">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:#888;"><i class="fas fa-spinner fa-spin"></i> 読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ===== Panel: Edit / New ===== -->
    <div class="panel" id="panel-edit">
      <div class="panel-title" id="edit-panel-title"><i class="fas fa-edit"></i> 記事を編集</div>

      <div class="form-grid">
        <!-- Left: main fields -->
        <div>
          <!-- Title -->
          <div class="form-card">
            <div class="form-card-title"><i class="fas fa-heading"></i> 基本情報</div>
            <div class="form-group">
              <label class="form-label">タイトル <span class="req">*</span></label>
              <input type="text" id="f-title" class="form-input" placeholder="記事タイトルを入力してください">
            </div>
            <div class="form-group">
              <label class="form-label">Slug（URL）</label>
              <input type="text" id="f-slug" class="form-input" readonly placeholder="自動生成されます">
              <p class="form-hint">タイトル入力時に post-YYYYMMDD-HHmmss 形式で自動生成されます。</p>
            </div>
            <div class="form-group">
              <label class="form-label">抜粋（一覧・OGP用）</label>
              <textarea id="f-excerpt" class="form-textarea" rows="3" placeholder="記事の要約を120文字程度で入力してください。"></textarea>
            </div>
          </div>

          <!-- Body -->
          <div class="form-card">
            <div class="form-card-title"><i class="fas fa-file-alt"></i> 本文</div>
            <div class="body-editor-wrap">
              <div class="snippet-bar">
                <button class="snippet-btn" data-snip="h2">H2</button>
                <button class="snippet-btn" data-snip="h3">H3</button>
                <button class="snippet-btn" data-snip="p">段落</button>
                <button class="snippet-btn" data-snip="ul">リスト</button>
                <button class="snippet-btn" data-snip="ol">番号リスト</button>
                <button class="snippet-btn" data-snip="strong">太字</button>
                <button class="snippet-btn" data-snip="blockquote">引用</button>
                <button class="snippet-btn" data-snip="link">リンク</button>
              </div>
              <div class="body-editor-tabs">
                <button class="editor-tab active" id="tab-write">編集</button>
                <button class="editor-tab" id="tab-preview">プレビュー</button>
              </div>
              <textarea id="body-html" placeholder="本文を入力してください。改行は自動的に反映されます。"></textarea>
              <div id="body-preview"></div>
            </div>
          </div>

          <!-- SEO -->
          <div class="form-card">
            <div class="form-card-title"><i class="fas fa-search"></i> SEO / OGP</div>
            <div class="form-group">
              <label class="form-label">SEOタイトル（省略時はタイトルを使用）</label>
              <input type="text" id="f-meta-title" class="form-input" placeholder="ページタイトル（60文字程度）">
            </div>
            <div class="form-group">
              <label class="form-label">Meta Description（省略時は抜粋を使用）</label>
              <textarea id="f-meta-desc" class="form-textarea" rows="2" placeholder="検索結果に表示される説明文（120文字程度）"></textarea>
            </div>
          </div>
        </div>

        <!-- Right: sidebar fields -->
        <div>
          <!-- Publish settings -->
          <div class="form-card">
            <div class="form-card-title"><i class="fas fa-cog"></i> 公開設定</div>
            <div class="form-group">
              <label class="form-label">ステータス</label>
              <select id="f-status" class="form-select">
                <option value="published">公開</option>
                <option value="draft">下書き</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">公開日 <span class="req">*</span></label>
              <input type="date" id="f-published-date" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-check">
                <input type="checkbox" id="f-featured">
                <span>注目記事（一覧ページのトップに表示）</span>
              </label>
            </div>
            <hr class="form-divider">
            <div class="form-actions">
              <button class="btn-primary" id="btn-save-publish"><i class="fas fa-globe"></i> 保存・公開</button>
              <button class="btn-save-draft" id="btn-save-draft"><i class="fas fa-save"></i> 下書き保存</button>
            </div>
            <button class="btn-secondary" id="btn-cancel" style="width:100%;margin-top:10px;text-align:center;">
              <i class="fas fa-times"></i> キャンセル
            </button>
          </div>

          <!-- Category & tags -->
          <div class="form-card">
            <div class="form-card-title"><i class="fas fa-tag"></i> カテゴリ・タグ</div>
            <div class="form-group">
              <label class="form-label">カテゴリ <span class="req">*</span></label>
              <select id="f-category" class="form-select">
                <option value="">— 選択 —</option>
                <option value="law">法改正情報</option>
                <option value="risk">リスク対策</option>
                <option value="ipo">IPO支援</option>
                <option value="outsourcing">アウトソーシング</option>
                <option value="subsidy">助成金</option>
                <option value="hr">人事制度</option>
                <option value="notice">お知らせ</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">タグ（カンマ区切り）</label>
              <input type="text" id="f-tags" class="form-input" placeholder="例: 法改正,育児休業,2026年">
            </div>
          </div>

          <!-- Eyecatch -->
          <div class="form-card">
            <div class="form-card-title"><i class="fas fa-image"></i> アイキャッチ</div>
            <div class="form-group">
              <label class="form-label">画像（JPG / PNG / WebP）</label>
              <input type="file" id="f-eyecatch-file" class="form-input" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp">
              <p class="form-hint">選択した画像は base64 で保存され、一覧・記事ページで表示されます。</p>
              <input type="hidden" id="f-eyecatch-data" value="">
              <div id="eyecatch-preview-wrap" class="eyecatch-preview-wrap" style="display:none;">
                <img id="eyecatch-preview" alt="プレビュー" class="eyecatch-preview-img">
                <button type="button" id="eyecatch-clear" class="btn-secondary" style="margin-top:8px;font-size:0.82rem;"><i class="fas fa-times"></i> 画像を削除</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">代替アイコン（画像なし時・Font Awesome class）</label>
              <input type="text" id="f-eyecatch-icon" class="form-input" placeholder="例: fas fa-balance-scale">
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ---- Confirm modal ---- -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">確認</div>
    <p class="modal-msg" id="modal-msg"></p>
    <div class="modal-actions">
      <button class="btn-secondary" id="modal-cancel">キャンセル</button>
      <button class="btn-delete" id="modal-ok">削除する</button>
    </div>
  </div>
</div>

<!-- ---- Spinner ---- -->
<div class="spinner-overlay" id="spinner">
  <div class="spinner"></div>
</div>

<!-- ---- Toast ---- -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   STRATOZ Column CMS – Admin JS
============================================================ */
(function () {

  /* ---- State ---- */
  let articles    = [];
  let editingId   = null;   // null = new article
  let deleteTarget = null;

  /* ---- DOM refs ---- */
  const $ = id => document.getElementById(id);

  /* ---- Toast ---- */
  function toast(msg, type = '') {
    const el = $('toast');
    el.className = 'toast ' + type;
    el.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  /* ---- Spinner ---- */
  function spinner(on) { $('spinner').className = 'spinner-overlay' + (on ? ' open' : ''); }

  /* ---- Panel switch ---- */
  function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    $(id).classList.add('active');
    document.querySelectorAll('[data-panel]').forEach(b => b.classList.remove('active'));
    const nav = document.querySelector(`[data-panel="${id}"]`);
    if (nav) nav.classList.add('active');
  }

  /* ---- Format date ---- */
  function fmtDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  /* ---- Category label map ---- */
  const catLabel = { law:'法改正情報', risk:'リスク対策', ipo:'IPO支援', outsourcing:'アウトソーシング', subsidy:'助成金', hr:'人事制度', notice:'お知らせ' };

  /* ---- Fetch all articles ---- */
  async function loadArticles() {
    try {
      const res = await fetch('../tables/columns?limit=200');
      const data = await res.json();
      articles = (data.data || []).sort((a, b) => new Date(b.published_date) - new Date(a.published_date));
      renderTable();
      updateStats();
    } catch(e) {
      toast('記事の読み込みに失敗しました', 'error');
    }
  }

  /* ---- Stats ---- */
  function updateStats() {
    $('stat-total').textContent     = articles.length;
    $('stat-published').textContent = articles.filter(a => a.status === 'published').length;
    $('stat-draft').textContent     = articles.filter(a => a.status === 'draft').length;
    $('stat-featured').textContent  = articles.filter(a => a.featured).length;
  }

  /* ---- Render table ---- */
  function renderTable() {
    const tbody = $('article-tbody');
    if (articles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#888;">記事はまだありません。新規作成してください。</td></tr>';
      return;
    }
    tbody.innerHTML = articles.map(a => `
      <tr>
        <td class="art-title-cell">
          <a href="../column/post.html?slug=${encodeURIComponent(a.slug)}" target="_blank">${a.title}</a>
        </td>
        <td class="art-slug-cell">${a.slug}</td>
        <td><span class="cat-badge cat-${a.category || 'notice'}">${a.category_label || catLabel[a.category] || a.category || '—'}</span></td>
        <td><span class="status-badge ${a.status === 'published' ? 'status-published' : 'status-draft'}">${a.status === 'published' ? '公開中' : '下書き'}</span></td>
        <td>${fmtDate(a.published_date)}</td>
        <td style="text-align:center;">${a.featured ? '<i class="fas fa-star featured-star" title="注目記事"></i>' : '—'}</td>
        <td>
          <div class="action-btns">
            <button class="btn-sm btn-edit" onclick="APP.editArticle('${a.id}')"><i class="fas fa-edit"></i> 編集</button>
            <button class="btn-sm btn-preview" onclick="window.open('../column/post.html?slug=${encodeURIComponent(a.slug)}','_blank')"><i class="fas fa-eye"></i></button>
            <button class="btn-sm btn-delete" onclick="APP.confirmDelete('${a.id}', '${a.title.replace(/'/g,"\\'").slice(0,30)}')"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  /* ---- Open edit form ---- */
  function editArticle(id) {
    const a = articles.find(x => x.id === id);
    if (!a) return;
    editingId = id;
    $('edit-panel-title').innerHTML = '<i class="fas fa-edit"></i> 記事を編集';
    fillForm(a);
    showPanel('panel-edit');
    window.scrollTo(0, 0);
  }

  /* ---- Open new form ---- */
  function newArticle() {
    editingId = null;
    $('edit-panel-title').innerHTML = '<i class="fas fa-plus-circle"></i> 新規記事を作成';
    clearForm();
    showPanel('panel-edit');
    window.scrollTo(0, 0);
  }

  /* ---- 本文の変換：HTML → プレーンテキスト（編集用） ---- */
  function htmlToPlain(html) {
    if (!html) return '';
    let t = String(html);
    t = t.replace(/\r\n/g, '\n');
    // 段落の区切りを空行として復元
    t = t.replace(/<\/p>\s*<p>/gi, '\n\n');
    // 改行タグを改行に
    t = t.replace(/<br\s*\/?>/gi, '\n');
    // 残りの p タグを除去
    t = t.replace(/<\/?p[^>]*>/gi, '');
    // その他タグを除去
    t = t.replace(/<[^>]+>/g, '');
    return t.trim();
  }

  /* ---- 本文の変換：プレーンテキスト → HTML（保存用） ---- */
  function plainToHtml(text) {
    if (!text) return '';
    const normalized = String(text).replace(/\r\n/g, '\n');
    // すべての改行を <br> にして 1つの <p> で囲む
    return '<p>' + normalized.replace(/\n/g, '<br>') + '</p>';
  }

  /* ---- Fill form ---- */
  function fillForm(a) {
    $('f-title').value          = a.title || '';
    $('f-slug').value           = a.slug || '';
    $('f-excerpt').value        = a.excerpt || '';
    $('body-html').value        = htmlToPlain(a.body || '');
    $('f-status').value         = a.status || 'draft';
    $('f-published-date').value = a.published_date || '';
    $('f-featured').checked     = !!a.featured;
    $('f-category').value       = a.category || '';
    $('f-tags').value           = a.tags || '';
    const eyecatchVal = a.eyecatch_url || '';
    if (eyecatchVal && eyecatchVal.startsWith('data:')) {
      $('f-eyecatch-data').value = eyecatchVal;
      $('eyecatch-preview').src = eyecatchVal;
      $('eyecatch-preview-wrap').style.display = 'block';
    } else {
      $('f-eyecatch-data').value = '';
      $('eyecatch-preview').src = '';
      $('eyecatch-preview-wrap').style.display = 'none';
    }
    $('f-eyecatch-file').value = '';
    $('f-eyecatch-icon').value  = a.eyecatch_icon || '';
    $('f-meta-title').value     = a.meta_title || '';
    $('f-meta-desc').value      = a.meta_desc || '';
    // Reset to write tab
    switchEditorTab('write');
  }

  /* ---- Clear form ---- */
  function clearForm() {
    ['f-title','f-slug','f-excerpt','body-html','f-tags','f-eyecatch-data','f-eyecatch-icon','f-meta-title','f-meta-desc'].forEach(id => $(id).value = '');
    $('f-eyecatch-file').value = '';
    $('eyecatch-preview').src = '';
    $('eyecatch-preview-wrap').style.display = 'none';
    $('f-status').value = 'published';
    $('f-published-date').value = new Date().toISOString().slice(0, 10);
    $('f-featured').checked = false;
    $('f-category').value = '';
    switchEditorTab('write');
  }

  /* ---- Slug: post-YYYYMMDD-HHmmss 形式で自動生成 ---- */
  function generateSlug() {
    const d = new Date();
    const Y = d.getFullYear();
    const M = String(d.getMonth() + 1).padStart(2, '0');
    const D = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    return `post-${Y}${M}${D}-${h}${m}${s}`;
  }

  function updateSlugFromTitle() {
    if (editingId) return; // 編集時は既存 slug を維持
    const title = $('f-title').value.trim();
    if (title) {
      $('f-slug').value = generateSlug();
    } else {
      $('f-slug').value = '';
    }
  }

  $('f-title').addEventListener('input', updateSlugFromTitle);
  $('f-title').addEventListener('change', updateSlugFromTitle);

  /* ---- アイキャッチ: ファイル選択 → base64 変換・プレビュー ---- */
  const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
  $('f-eyecatch-file').addEventListener('change', function () {
    const file = this.files && this.files[0];
    if (!file) return;
    if (!allowedTypes.includes(file.type)) {
      toast('JPG / PNG / WebP 形式の画像を選択してください', 'error');
      this.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = function () {
      $('f-eyecatch-data').value = reader.result;
      $('eyecatch-preview').src = reader.result;
      $('eyecatch-preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
  $('eyecatch-clear').addEventListener('click', function () {
    $('f-eyecatch-file').value = '';
    $('f-eyecatch-data').value = '';
    $('eyecatch-preview').src = '';
    $('eyecatch-preview-wrap').style.display = 'none';
  });

  /* ---- Save article ---- */
  async function saveArticle(status) {
    const title = $('f-title').value.trim();
    let slug    = $('f-slug').value.trim();
    const cat   = $('f-category').value;
    const date  = $('f-published-date').value;

    if (!title) { toast('タイトルを入力してください', 'error'); return; }
    if (!slug)  { slug = generateSlug(); $('f-slug').value = slug; } // 保存時に空なら自動補完
    if (!cat)   { toast('カテゴリを選択してください', 'error'); return; }
    if (!date)  { toast('公開日を入力してください', 'error'); return; }

    // Check slug uniqueness (exclude self when editing)
    const duplicate = articles.find(a => a.slug === slug && a.id !== editingId);
    if (duplicate) { toast('同じSlugの記事が既に存在します', 'error'); return; }

    const payload = {
      title,
      slug,
      excerpt:        $('f-excerpt').value.trim(),
      body:           plainToHtml($('body-html').value),
      status:         status || $('f-status').value,
      published_date: date,
      featured:       $('f-featured').checked,
      category:       cat,
      category_label: catLabel[cat] || cat,
      tags:           $('f-tags').value.trim(),
      eyecatch_url:   $('f-eyecatch-data').value.trim(),
      eyecatch_icon:  $('f-eyecatch-icon').value.trim(),
      meta_title:     $('f-meta-title').value.trim(),
      meta_desc:      $('f-meta-desc').value.trim(),
    };

    spinner(true);
    try {
      let res;
      if (editingId) {
        res = await fetch(`../tables/columns/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } else {
        res = await fetch('../tables/columns', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      }
      if (!res.ok) throw new Error('API error ' + res.status);
      toast(editingId ? '記事を更新しました ✓' : '記事を作成しました ✓', 'success');
      await loadArticles();
      showPanel('panel-list');
    } catch(e) {
      toast('保存に失敗しました: ' + e.message, 'error');
    } finally {
      spinner(false);
    }
  }

  /* ---- Delete ---- */
  function confirmDelete(id, titlePreview) {
    deleteTarget = id;
    $('modal-title').textContent = '記事を削除しますか？';
    $('modal-msg').textContent   = `「${titlePreview}…」を削除します。この操作は取り消せません。`;
    $('confirm-modal').classList.add('open');
  }

  async function doDelete() {
    if (!deleteTarget) return;
    $('confirm-modal').classList.remove('open');
    spinner(true);
    try {
      await fetch(`../tables/columns/${deleteTarget}`, { method: 'DELETE' });
      toast('記事を削除しました', 'success');
      deleteTarget = null;
      await loadArticles();
    } catch(e) {
      toast('削除に失敗しました', 'error');
    } finally {
      spinner(false);
    }
  }

  /* ---- HTML snippet insertion ---- */
  const snippets = {
    h2:         '<h2>見出しをここに入力</h2>\n',
    h3:         '<h3>小見出しをここに入力</h3>\n',
    p:          '<p>本文をここに入力してください。</p>\n',
    ul:         '<ul>\n  <li>項目1</li>\n  <li>項目2</li>\n  <li>項目3</li>\n</ul>\n',
    ol:         '<ol>\n  <li>手順1</li>\n  <li>手順2</li>\n  <li>手順3</li>\n</ol>\n',
    strong:     '<strong>強調テキスト</strong>',
    blockquote: '<blockquote>引用文をここに入力してください。</blockquote>\n',
    link:       '<a href="URL">リンクテキスト</a>',
  };
  document.querySelectorAll('.snippet-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ta = $('body-html');
      const snip = snippets[btn.dataset.snip] || '';
      const start = ta.selectionStart;
      const before = ta.value.slice(0, start);
      const after  = ta.value.slice(ta.selectionEnd);
      ta.value = before + snip + after;
      ta.selectionStart = ta.selectionEnd = start + snip.length;
      ta.focus();
    });
  });

  /* ---- Editor tabs ---- */
  function switchEditorTab(tab) {
    if (tab === 'write') {
      $('body-html').style.display    = 'block';
      $('body-preview').style.display = 'none';
      $('tab-write').classList.add('active');
      $('tab-preview').classList.remove('active');
    } else {
      $('body-html').style.display    = 'none';
      $('body-preview').style.display = 'block';
      const html = plainToHtml($('body-html').value);
      $('body-preview').innerHTML     = html || '<em style="color:#aaa;">本文がありません</em>';
      $('tab-write').classList.remove('active');
      $('tab-preview').classList.add('active');
    }
  }
  $('tab-write').addEventListener('click',   () => switchEditorTab('write'));
  $('tab-preview').addEventListener('click', () => switchEditorTab('preview'));

  /* ---- Event bindings ---- */
  $('btn-new-article').addEventListener('click', newArticle);
  $('nav-list').addEventListener('click', () => showPanel('panel-list'));
  $('btn-save-publish').addEventListener('click',  () => saveArticle('published'));
  $('btn-save-draft').addEventListener('click',    () => saveArticle('draft'));
  $('btn-cancel').addEventListener('click',        () => showPanel('panel-list'));
  $('modal-cancel').addEventListener('click', () => $('confirm-modal').classList.remove('open'));
  $('modal-ok').addEventListener('click', doDelete);

  /* ---- Expose to global (onclick handlers) ---- */
  window.APP = { editArticle, confirmDelete };

  /* ---- Init ---- */
  loadArticles();

})();
</script>
</body>
</html>
